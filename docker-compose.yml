version: '3.8'

services:
  messenger:
    build: .
    container_name: secure_chat_node
    restart: always
    volumes:
      # Пробрасываем только папку для фото/аудио, чтобы они не пропадали.
      # База данных и ключи будут жить внутри контейнера (при пересоздании контейнера они сбросятся, для тестов это Ок).
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"

  caddy:
    image: caddy:2.7-alpine
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - messenger

volumes:
  caddy_data:
  caddy_config: