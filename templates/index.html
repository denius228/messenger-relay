<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Secure Chat</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#17212b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

    <!-- ВНЕШНИЕ БИБЛИОТЕКИ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <!-- ПОДКЛЮЧАЕМ НАШ СТИЛЬ -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Передаем ключ для Push-уведомлений из Flask в JS -->
    <script>const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";</script>
</head>
<body>
    {% if not logged_in %}
        <div style="padding:60px; text-align:center;">
            <h2 style="color:#40a7e3">SECURE LOGIN</h2>
            <form method="POST" action="/login">
                <input type="password" name="password" placeholder="Password" autofocus style="width:100%; padding:15px; background:#242f3d; color:white; border:1px solid #40a7e3; border-radius:15px; text-align:center; box-sizing:border-box;">
                <button type="submit" style="margin-top:30px; background:#40a7e3; color:white; padding:15px; width:100%; border-radius:15px; border:none; font-weight:bold; font-size:16px;">ENTER</button>
            </form>
        </div>
    {% else %}
        <div id="web3-auth-modal"></div>

        <div class="header">
            <button class="btn-small" onclick="showProfile()">PROFILE</button>
            <span>E2EE CHAT ⚡</span> 
            <button class="btn-small" onclick="enablePush()" id="push-btn">🔔</button>
            <button class="btn-small" onclick="document.getElementById('add-modal').style.display='block'">+ ADD</button>
        </div>
        <div id="status-bar">SYSTEM READY</div>
        <div id="contact-list"></div>
        <div id="chat"></div>
        
        <div id="typing-indicator" style="display:none; padding: 5px 15px; font-size: 12px; color: #40a7e3; font-style: italic; background: #17212b;"></div>
        
        <div id="video-preview-container">
            <video id="video-preview" autoplay muted playsinline></video>
        </div>

        <div class="controls" id="main-controls">
            <button onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" style="display:none" onchange="uploadMedia(this.files[0])">
            <div class="input-area">
                <input type="text" id="content" placeholder="Message..." 
                    oninput="notifyTyping('typing')" 
                    onkeypress="if(event.key === 'Enter') sendText()" 
                    onfocus="setTimeout(() => document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight, 300)">
                <button id="video-btn" onclick="toggleVideo()" style="margin-right: 5px;">📷</button>
                <button id="voice-btn" onclick="toggleVoice()">🎤</button>
            </div>
            <button onclick="sendText()">➤</button>
        </div>

        <div id="add-modal" class="modal">
            <h3>Add Contact</h3>
            <button onclick="startScanner()" style="background:#2b5278; color:white; padding:10px; border-radius:10px; width:100%; margin-bottom:15px; font-size:14px; border:none;">📷 SCAN QR CODE</button>
            <div id="reader"></div>
            <input type="text" id="new-name" placeholder="Friend's Username (e.g. @alice)">
            <input type="hidden" id="new-ip">
            <input type="hidden" id="new-shared-secret">
            <button onclick="addContact()" style="background:#40a7e3; color:white; padding:12px; border-radius:12px; width:100%; font-size:16px; border:none; font-weight:bold;">SAVE CONTACT</button>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; margin-top:10px; background:none; border:none;">CANCEL</button>
        </div>

        <div id="profile-modal" class="modal">
            <h3>Web3 Identity</h3>
            <input type="text" id="my-username" readonly style="background:none; border:none; color:#40a7e3; text-align:center; font-weight:bold; font-size:18px; outline:none;">
            <div id="qr-code"></div>
            <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                <p style="font-size:11px; color:#7f91a4;">Фраза зашифрована. Введите локальный PIN-код для просмотра.</p>
                <input type="password" id="profile-pin" placeholder="Введите PIN-код" style="font-size:14px; margin-bottom:10px; text-align:center;">
                <button onclick="revealSeedInProfile()" style="background:#ff9800; color:white; padding:10px; border-radius:10px; width:100%; font-size:12px; border:none; font-weight:bold;">👁️ ПОКАЗАТЬ ФРАЗУ НА 10 СЕК</button>
                <div id="revealed-seed" style="display:none; margin-top:10px; color:#ff4d4d; font-weight:bold; font-size:14px; background:#182533; padding:15px; border-radius:10px; line-height:1.5;"></div>
            </div>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; background:none; border:none; margin-top:15px;">ЗАКРЫТЬ</button>
        </div>
        
        <!-- ПОДКЛЮЧАЕМ НАШ СКРИПТ В САМОМ КОНЦЕ -->
        <script src="/static/js/main.js"></script>
    {% endif %}
</body>
</html>
