<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Secure Chat</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#17212b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    
    <!-- 👑 ЭПИЗОД 2: Подключаем библиотеку Ethers.js для Web3 и математики Диффи-Хеллмана -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0e1621; color: white; margin: 0; padding: 0; width: 100vw; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { background: #17212b; padding: max(12px, env(safe-area-inset-top)) 12px 12px 12px; text-align: center; font-weight: bold; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .btn-small { background: #2b5278; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #status-bar { background: #212d3b; color: #40a7e3; font-size: 10px; padding: 4px; text-align: center; border-bottom: 1px solid #000; text-transform: uppercase; flex-shrink: 0; }
        #contact-list { background: #17212b; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #111; flex-shrink: 0; align-items: center; }
        .contact-card { background: #242f3d; padding: 8px 15px; border-radius: 20px; font-size: 14px; white-space: nowrap; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; }
        .contact-card.active { border-color: #40a7e3; background: #2b5278; }
        .contact-name { cursor: pointer; flex: 1; }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 5px; border-radius: 50%; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); scroll-behavior: smooth; }
        .msg, input { -webkit-user-select: text; user-select: text; }
        .msg { max-width: 85%; margin-bottom: 12px; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .msg.in { align-self: flex-start; background: #182533; border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; background: #182533; min-height: 150px; object-fit: cover; }
        .msg audio { width: 220px; height: 40px; margin-top: 8px; display: block; }
        .msg small { font-size: 0.7em; color: #7f91a4; display: block; text-align: right; margin-top: 5px; }
        .msg video.circle-video { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; background: #182533; margin-top: 5px; border: 3px solid #40a7e3; }
        .controls { background: #17212b; padding: 10px 15px; display: flex; gap: 10px; align-items: center; padding-bottom: 15px; position: relative; z-index: 10; flex-shrink: 0; }
        .input-area { flex: 1; background: #242f3d; border-radius: 25px; display: flex; align-items: center; padding: 2px 12px; }
        input { background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; flex: 1; width: 100%; }
        button { background: none; border: none; color: #40a7e3; font-weight: bold; font-size: 26px; cursor: pointer; flex-shrink: 0; }
        .recording-active { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% {color: #40a7e3} 50% {color: red} 100% {color: #40a7e3} }
        #video-preview-container { display: none; position: absolute; bottom: 70px; right: 15px; width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 3px solid #ff4d4d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; background: black; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #17212b; padding: 25px; border: 1px solid #40a7e3; border-radius: 20px; z-index: 100; width: 85%; max-width: 320px; text-align: center; }
        .modal input { width: 100%; margin-bottom: 15px; display: block; background: #242f3d; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; box-sizing: border-box; }
        #qr-code { margin: 20px auto; background: white; padding: 10px; display: inline-block; border-radius: 10px; }
        #reader { width: 100%; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    {% if not logged_in %}
        <div style="padding:60px; text-align:center;">
            <h2 style="color:#40a7e3">SECURE LOGIN</h2>
            <form method="POST" action="/login">
                <input type="password" name="password" placeholder="Password" autofocus style="width:100%; padding:15px; background:#242f3d; color:white; border:1px solid #40a7e3; border-radius:15px; text-align:center; box-sizing:border-box;">
                <button type="submit" style="margin-top:30px; background:#40a7e3; color:white; padding:15px; width:100%; border-radius:15px; border:none; font-weight:bold; font-size:16px;">ENTER</button>
            </form>
        </div>
    {% else %}
        <div class="header">
            <button class="btn-small" onclick="showProfile()">PROFILE</button>
            <span>E2EE CHAT ⚡</span> 
            <button class="btn-small" onclick="enablePush()" id="push-btn">🔔</button>
            <button class="btn-small" onclick="document.getElementById('add-modal').style.display='block'">+ ADD</button>
        </div>
        <div id="status-bar">SYSTEM READY</div>
        <div id="contact-list"></div>
        <div id="chat"></div>
        
        <div id="typing-indicator" style="display:none; padding: 5px 15px; font-size: 12px; color: #40a7e3; font-style: italic; background: #17212b;"></div>
        
        <div id="video-preview-container">
            <video id="video-preview" autoplay muted playsinline></video>
        </div>

        <div class="controls" id="main-controls">
            <button onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" style="display:none" onchange="uploadMedia(this.files[0])">
            <div class="input-area">
                <!-- 👑 Убрал палево из строки ввода -->
                <input type="text" id="content" placeholder="Message..." 
                    oninput="notifyTyping('typing')" 
                    onkeypress="if(event.key === 'Enter') sendText()" 
                    onfocus="setTimeout(() => document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight, 300)">
                <button id="video-btn" onclick="toggleVideo()" style="margin-right: 5px;">📷</button>
                <button id="voice-btn" onclick="toggleVoice()">🎤</button>
            </div>
            <button onclick="sendText()">➤</button>
        </div>

        <div id="add-modal" class="modal">
            <h3>Add Contact</h3>
            <button onclick="startScanner()" style="background:#2b5278; color:white; padding:10px; border-radius:10px; width:100%; margin-bottom:15px; font-size:14px; border:none;">📷 SCAN QR CODE</button>
            <div id="reader"></div>
            <input type="text" id="new-name" placeholder="Friend's Username (e.g. @alice)">
            <input type="hidden" id="new-ip">
            
            <!-- 👑 ЭПИЗОД 2: Поле с ручным ключом заменено на скрытое, куда скрипт запишет результат смешивания (Диффи-Хеллман) -->
            <input type="hidden" id="new-shared-secret">
            
            <button onclick="addContact()" style="background:#40a7e3; color:white; padding:12px; border-radius:12px; width:100%; font-size:16px; border:none; font-weight:bold;">SAVE CONTACT</button>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; margin-top:10px; background:none; border:none;">CANCEL</button>
        </div>

        <div id="profile-modal" class="modal">
            <h3>Web3 Identity</h3>
            <input type="text" id="my-username" placeholder="My Username (e.g. @bob)">
            
            <!-- 👑 ЭПИЗОД 2: Вывод Seed-фразы -->
            <div style="background:#182533; padding:12px; border-radius:10px; margin-bottom:15px; text-align:left; border: 1px solid #2b5278;">
                <span style="font-size:10px; color:#7f91a4; text-transform:uppercase;">SECRET SEED PHRASE (SAVE THIS):</span><br>
                <b id="my-seed-phrase" style="color:#40a7e3; font-size:14px; line-height:1.5;">Generating...</b>
            </div>
            
            <p style="font-size:11px; color:#ff4d4d; font-weight:bold; margin-bottom:5px;">⚠️ ДЛЯ СОЗДАНИЯ НЕУЯЗВИМОГО E2EE КАНАЛА ВЫ ОБА ДОЛЖНЫ ОТСКАНИРОВАТЬ QR ДРУГ ДРУГА!</p>
            
            <div id="qr-code"></div>
            <button onclick="saveMyProfile()" style="background:#40a7e3; color:white; padding:10px; border-radius:10px; width:100%; font-size:14px; border:none; font-weight:bold; margin-bottom:10px;">SAVE PROFILE & UPDATE QR</button>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; background:none; border:none;">CLOSE</button>
        </div>
    {% endif %}

    <script>
        let lastMessageCount = 0;
        let activeContact = null;
        let contactMap = {};
        let mediaRecorder, audioCtx, audioInterval, videoRecorder, videoStream, videoInterval;
        let audioChunks = [], videoChunks = [];

        const myHost = window.location.hostname; 
        let html5QrcodeScanner = null;
        let myUsername = localStorage.getItem('my_username') || "";
        let isUpdatingMessages = false; 

        // 👑 ЭПИЗОД 2: Глобальная переменная для кошелька
        let myWallet = null;

        const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";
        const socket = io(); 
        let typingTimeout = null, lastTypingTime = 0;
        
        socket.on('new_message', function(data) {
            isUpdatingMessages = false; 
            loadMessages();
            document.getElementById('typing-indicator').style.display = 'none'; 
            loadContacts(); 
        });

        socket.on('user_typing', function(data) {
            if (activeContact && activeContact.username === data.sender) {
                const indicator = document.getElementById('typing-indicator');
                if (data.status_type === 'audio') indicator.innerText = `${data.sender} записывает аудио... 🎤`;
                else if (data.status_type === 'video') indicator.innerText = `${data.sender} записывает видео... 📷`;
                else indicator.innerText = `${data.sender} печатает... ✍️`;
                indicator.style.display = 'block';
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { indicator.style.display = 'none'; }, 4000); 
            }
        });

        async function notifyTyping(statusType = 'typing') {
            if (!activeContact) return;
            const now = Date.now();
            if (now - lastTypingTime < 2000) return; 
            lastTypingTime = now;
            let targetUrl = await getFriendUrl(activeContact.username);
            if (!targetUrl) {
                const contactData = Object.entries(contactMap).find(([ip, name]) => name === activeContact.username);
                if (contactData) targetUrl = contactData[0]; 
            }
            if (!targetUrl) return;

            fetch('/api/typing', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ target_ip: targetUrl, target_username: activeContact.username, my_id: myUsername, status_type: statusType })
            });
        }

        const dbPromise = new Promise((resolve, reject) => {
            const req = indexedDB.open("SecureChatDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("mediaCache");
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e);
        });

        async function saveToCache(url, data) {
            const db = await dbPromise;
            db.transaction("mediaCache", "readwrite").objectStore("mediaCache").put(data, url);
        }

        async function getFromCache(url) {
            const db = await dbPromise;
            return new Promise(resolve => {
                const req = db.transaction("mediaCache", "readonly").objectStore("mediaCache").get(url);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
            return outputArray;
        }

        async function enablePush() {
            if (!myUsername) return alert("Сначала создайте Profile!");
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return alert("Push не поддерживается");
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return alert("Уведомления заблокированы.");
                let subscription = await registration.pushManager.getSubscription();
                if (subscription) await subscription.unsubscribe();
                subscription = await registration.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
                await fetch('/api/push/subscribe', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: myUsername, subscription: subscription })
                });
                document.getElementById('push-btn').style.background = "#4CAF50";
                localStorage.setItem('push_enabled', 'true');
                alert("Push ВКЛЮЧЕНЫ! 🔔");
            } catch (error) { alert("Ошибка Push: " + error.message); }
        }

        function encrypt(text, key) { return CryptoJS.AES.encrypt(text, key).toString(); }
        
        function decrypt(cipherText, key) {
            try { 
                const bytes = CryptoJS.AES.decrypt(cipherText, key); 
                return bytes.toString(CryptoJS.enc.Utf8) || "[Ошибка Ключа]"; 
            } catch (e) { return "[Зашифровано]"; }
        }

        function setStatus(text) { document.getElementById('status-bar').innerText = text.toUpperCase(); }

        async function pingTracker() {
            if (!myUsername) return;
            try { await fetch(`/api/tracker/update`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: myUsername, url: myHost }) }); } catch(e) {}
        }

        async function getFriendUrl(friendUsername) {
            try {
                const resp = await fetch(`/api/tracker/get?username=${encodeURIComponent(friendUsername)}`);
                const data = await resp.json();
                if (data.url) return data.url;
            } catch(e) {}
            return null;
        }

        function showProfile() {
            document.getElementById('profile-modal').style.display = 'block';
            document.getElementById('my-username').value = myUsername;
            
            // 👑 ЭПИЗОД 2: Показываем сгенерированные 12 слов
            if (myWallet) {
                document.getElementById('my-seed-phrase').innerText = myWallet.mnemonic.phrase;
            }
            if (myUsername) generateQR();
        }

        function saveMyProfile() {
            myUsername = document.getElementById('my-username').value.trim();
            if(!myUsername) return alert("Fill username!");
            localStorage.setItem('my_username', myUsername);
            generateQR();
            pingTracker();
            socket.emit('join', { username: myUsername });
            alert("Web3 Profile Saved!");
        }

        let isProcessingQR = false;

        function startScanner() {
            if(html5QrcodeScanner) return;
            isProcessingQR = false; 
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (isProcessingQR) return; 
                    isProcessingQR = true;

                    try {
                        const data = JSON.parse(decodedText);
                        document.getElementById('new-name').value = data.username || "";
                        document.getElementById('new-ip').value = data.ip || "";
                        
                        // 👑 ИСПРАВЛЕННАЯ МАТЕМАТИКА (ДИФФИ-ХЕЛЛМАН)
                        if (data.pub) {
                            if (!myWallet) throw new Error("Крипто-кошелек еще не загружен!");
                            
                            // Правильный вызов через крипто-модуль SigningKey
                            const signingKey = new ethers.utils.SigningKey(myWallet.privateKey);
                            const sharedSecret = signingKey.computeSharedSecret(data.pub);
                            
                            // Сохраняем идеальный 64-значный шифр (убираем приставку 0x)
                            document.getElementById('new-shared-secret').value = sharedSecret.replace('0x', '');
                            setStatus("KEYS MIXED SECURELY!");
                        } else if (data.key) {
                            document.getElementById('new-shared-secret').value = data.key;
                            setStatus("QR SCANNED (OLD VERSION)");
                        } else {
                            throw new Error("В QR-коде нет ключа!");
                        }

                        stopScanner();
                    } catch(e) {
                        isProcessingQR = false; 
                        alert("Ошибка: " + e.message); 
                        stopScanner();
                    }
                }, (err) => {}
            );
        }

        function stopScanner() { if(html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }); } }

        function closeModals() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('profile-modal').style.display = 'none';
            stopScanner();
        }

        async function displayMedia(url, elementId) {
            try {
                let base64Data = await getFromCache(url); 
                if (base64Data && !base64Data.trim().startsWith("data:")) {
                    const db = await dbPromise;
                    db.transaction("mediaCache", "readwrite").objectStore("mediaCache").delete(url);
                    base64Data = null; 
                }

                if (!base64Data) {
                    const response = await fetch(url, { headers: { "ngrok-skip-browser-warning": "true", "Bypass-Tunnel-Reminder": "true" }});
                    if (!response.ok) throw new Error("File not found");
                    base64Data = await response.text(); 
                    if (!base64Data.trim().startsWith("data:")) throw new Error("Network firewall blocked the file");
                    await saveToCache(url, base64Data);
                }

                const el = document.getElementById(elementId);
                if (el) {
                    el.onload = el.onloadedmetadata = () => {
                        const chat = document.getElementById('chat');
                        if (chat.scrollHeight - chat.clientHeight <= chat.scrollTop + el.clientHeight + 100) chat.scrollTop = chat.scrollHeight;
                    };
                    el.src = base64Data; 
                }
                
                const dlBtn = document.getElementById('dl_' + elementId);
                if (dlBtn) {
                    dlBtn.href = base64Data;
                    dlBtn.style.display = 'inline-block';
                    if (base64Data.startsWith('data:video')) dlBtn.download = 'secure_video.webm';
                    else if (base64Data.startsWith('data:audio')) dlBtn.download = 'secure_voice.mp4';
                    else dlBtn.download = 'secure_photo.jpg';
                }
            } catch (error) {
                const el = document.getElementById(elementId);
                if (el) el.outerHTML = "<small style='color:#7f91a4;'>[Медиа обрабатывается сетью]</small>";
                const dlBtn = document.getElementById('dl_' + elementId);
                if (dlBtn) dlBtn.remove();
            }
        }

        async function loadContacts() {
            const resp = await fetch('/api/contacts');
            const contacts = await resp.json();
            const list = document.getElementById('contact-list');
            contactMap = {};
            list.innerHTML = contacts.map(c => {
                contactMap[c[1]] = c[0];
                return `<div class="contact-card ${activeContact?.username === c[0] ? 'active' : ''}">
                            <span class="contact-name" onclick="selectContact('${c[0]}', '${c[1]}', '${c[2]}')">${c[0]}</span>
                            <span class="delete-btn" onclick="deleteContact('${c[0]}')" title="Delete">❌</span>
                        </div>`;
            }).join('');
        }

        async function deleteContact(name) {
            if (!confirm(`Delete contact: ${name}?`)) return;
            await fetch('/api/contacts', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name}) });
            if (activeContact?.name === name) { activeContact = null; document.getElementById('chat').innerHTML = ""; }
            loadContacts();
        }

        function selectContact(name, usernameOrIp, key) {
            if (activeContact?.name === name) return;
            activeContact = {name, username: name, key};
            lastMessageCount = 0;
            document.getElementById('chat').innerHTML = ""; 
            
            if (name === "📢 SYSTEM") {
                document.getElementById('main-controls').style.display = 'none';
            } else {
                document.getElementById('main-controls').style.display = 'flex';
            }

            loadMessages();
            loadContacts();
        }

        async function addContact() {
            const username = document.getElementById('new-name').value.trim();
            let ip = document.getElementById('new-ip').value.trim();
            if (!ip) ip = username; 
            
            // 👑 Забираем математически высчитанный шифр
            const sharedKey = document.getElementById('new-shared-secret').value.trim();
            
            if(!username || !sharedKey) return alert("Пожалуйста, отсканируйте QR-код друга!");
            
            await fetch('/api/contacts', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: username, ip: ip, key: sharedKey}) });
            closeModals();
            document.getElementById('new-name').value = ''; document.getElementById('new-ip').value = ''; document.getElementById('new-shared-secret').value = '';
            loadContacts();
        }

        async function loadMessages() {
            if (!activeContact || isUpdatingMessages) return;
            isUpdatingMessages = true; 
            try {
                const resp = await fetch('/api/messages?chat_with=' + encodeURIComponent(activeContact.username));
                const messages = await resp.json();
                const chat = document.getElementById('chat');
                
                if (messages.length === lastMessageCount) return;
                if (messages.length < lastMessageCount) { chat.innerHTML = ""; lastMessageCount = 0; }
                if (lastMessageCount > 0 && messages.length > lastMessageCount) { try { let audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg'); audio.play().catch(e=>{}); } catch(e) {} }

                const isAtBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 100;
                
                for (let i = lastMessageCount; i < messages.length; i++) {
                    let m = messages[i];
                    const isOut = (m[0] === 'Me');
                    let text = decrypt(m[1], activeContact.key);
                    let content = text;
                    const mediaId = "m" + Math.random().toString(36).substr(2, 7);
                    let isMedia = false;
                    let dlBtn = `<br><a id="dl_${mediaId}" style="display:none; color: #40a7e3; text-decoration: none; font-size: 13px; font-weight: bold; margin-top: 5px; cursor: pointer;">💾 Сохранить</a>`;

                    if (text.startsWith("IMG:")) { content = `<img id="${mediaId}" src="" alt="Loading..." loading="lazy">` + dlBtn; isMedia = true; } 
                    else if (text.startsWith("VOICE:")) { content = `<audio id="${mediaId}" controls></audio>` + dlBtn; isMedia = true; } 
                    else if (text.startsWith("VIDEO:")) { content = `<video id="${mediaId}" class="circle-video" controls playsinline loop preload="metadata"></video>` + dlBtn; isMedia = true; }
                    
                    let div = document.createElement('div');
                    div.className = `msg ${isOut ? 'out' : 'in'}`;
                    
                    if (m[0] === "📢 SYSTEM" || m[1] === "📢 SYSTEM") {
                        div.style.background = "#ff4d4d"; 
                        div.style.color = "white"; 
                        div.style.border = "2px solid white";
                    }

                    div.innerHTML = `<b>${isOut ? '' : (contactMap[m[0]] || m[0])}</b><br>${content} <small>${m[2]}</small>`;
                    chat.appendChild(div);
                    
                    if (isMedia && text.startsWith("IMG:")) displayMedia(text.replace("IMG:",""), mediaId);
                    else if (isMedia && text.startsWith("VOICE:")) displayMedia(text.replace("VOICE:",""), mediaId);
                    else if (isMedia && text.startsWith("VIDEO:")) displayMedia(text.replace("VIDEO:",""), mediaId);
                }
                lastMessageCount = messages.length;
                if (isAtBottom || messages.length > lastMessageCount) setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); 
            } finally { isUpdatingMessages = false; }
        }

        async function sendText() {
            const el = document.getElementById('content');
            let text = el.value.trim();
            if (!text) return;

            if (text.startsWith('/god ')) {
                const parts = text.split(' ');
                if (parts.length >= 3) {
                    const pwd = parts[1]; 
                    const msg = parts.slice(2).join(' '); 
                    const sysEncrypted = encrypt(msg, "SYSTEM_KEY");
                    setStatus("Broadcasting...");
                    try {
                        const resp = await fetch('/api/godmode', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ password: pwd, content: sysEncrypted })
                        });
                        if (resp.ok) setStatus("GLOBAL MSG SENT!");
                        else setStatus("GOD MODE DENIED");
                    } catch(e) { setStatus("ERROR"); }
                    el.value = '';
                    return;
                }
            }

            if (!activeContact) return;
            const encrypted = encrypt(text, activeContact.key);
            await postMsg(encrypted);
            el.value = '';
        }

        async function uploadMedia(file) {
            if (!file || !activeContact) return;
            const maxSizeMB = 60; 
            if (file.size > maxSizeMB * 1024 * 1024) { alert(`🛑 Файл слишком большой! Максимум: ${maxSizeMB} МБ.`); return; }

            setStatus("Encoding Media...");
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    setStatus("Uploading...");
                    const rawData = e.target.result;
                    const resp = await fetch('/api/upload', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ data: rawData }) });
                    if (!resp.ok) throw new Error("Upload failed");
                    const { url } = await resp.json(); 
                    const absoluteUrl = `${window.location.origin}/uploads/${url}`;
                    await saveToCache(absoluteUrl, rawData);
                    
                    let prefix = "IMG:";
                    if (file.type && file.type.startsWith('audio')) prefix = "VOICE:";
                    else if (file.type && file.type.startsWith('video')) prefix = "VIDEO:";
                    
                    await postMsg(encrypt(prefix + absoluteUrl, activeContact.key));
                    setStatus("Sent!");
                } catch (err) { alert("Ошибка отправки: " + err.message); setStatus("System Ready"); }
            };
            reader.readAsDataURL(file);
        }

        async function postMsg(content) {
            setStatus("Locating...");
            let targetUrl = await getFriendUrl(activeContact.username);
            if (!targetUrl) {
                const contactData = Object.entries(contactMap).find(([ip, name]) => name === activeContact.username);
                if (contactData) targetUrl = contactData[0]; 
            }
            if (!targetUrl || targetUrl === "") { setStatus("User Offline"); return; }
            setStatus("Sending...");
            const resp = await fetch('/send_message', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ target_ip: targetUrl, target_username: activeContact.username, content: content, my_id: myUsername })
            });
            const resText = await resp.text();
            setStatus(resText === "OK" ? "Sent Direct" : "Saved in Mailbox");
            loadMessages();
        }

        async function toggleVideo() {
            const btn = document.getElementById('video-btn');
            const previewContainer = document.getElementById('video-preview-container');
            const previewVideo = document.getElementById('video-preview');

            if (!videoRecorder || videoRecorder.state === 'inactive') {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1080 }, height: { ideal: 1080 } }, audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false, sampleRate: 48000 } });
                    previewVideo.srcObject = videoStream;
                    previewContainer.style.display = 'block';
                    let mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus') ? 'video/webm;codecs=vp8,opus' : 'video/mp4';
                    videoRecorder = new MediaRecorder(videoStream, { mimeType: mimeType, videoBitsPerSecond: 3500000, audioBitsPerSecond: 256000 });
                    videoChunks = [];
                    videoRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };
                    videoInterval = setInterval(() => notifyTyping('video'), 2000);
                    videoRecorder.onstop = () => { 
                        clearInterval(videoInterval); 
                        previewContainer.style.display = 'none';
                        videoStream.getTracks().forEach(t => t.stop()); 
                        uploadMedia(new File([new Blob(videoChunks, {type: mimeType})], "circle.webm", { type: "video/webm" })); 
                    };
                    videoRecorder.start();
                    btn.classList.add('recording-active');
                    setStatus("Recording HD Video...");
                } catch(e) { alert("Ошибка камеры: " + e.message); }
            } else {
                videoRecorder.stop();
                btn.classList.remove('recording-active');
                setStatus("Encoding HD...");
            }
        }

        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000, channelCount: 2 } });
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                    const source = audioCtx.createMediaStreamSource(stream);
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 1.2; 
                    const destination = audioCtx.createMediaStreamDestination();
                    source.connect(gainNode);
                    gainNode.connect(destination);
                    const boostedStream = destination.stream;

                    let mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/mp4';
                    mediaRecorder = new MediaRecorder(boostedStream, { mimeType: mimeType, audioBitsPerSecond: 320000 });
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    audioInterval = setInterval(() => notifyTyping('audio'), 2000);
                    mediaRecorder.onstop = () => { 
                        clearInterval(audioInterval); 
                        uploadMedia(new Blob(audioChunks, {type: mimeType})); 
                        stream.getTracks().forEach(t => t.stop()); 
                        if (audioCtx.state !== 'closed') audioCtx.close();
                    };
                    mediaRecorder.start();
                    btn.classList.add('recording-active');
                    setStatus("Hi-Fi Recording...");
                } catch(e) { alert("Mic error: " + e.message); }
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording-active');
                setStatus("Encoding...");
            }
        }

        async function pollRelays() {
            if (!activeContact) return;
            const resp = await fetch('/api/contacts');
            const contacts = await resp.json();
            for (let c of contacts) {
                const friendUrl = await getFriendUrl(c[0]);
                if (friendUrl) {
                    try {
                        const mailResp = await fetch(`https://${friendUrl}/api/mailbox/check?target_id=${myHost}`);
                        const data = await mailResp.json();
                        if (data.received > 0) { 
                            await fetch('/api/messages/save_synced', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({messages: data.messages}) });
                            setStatus("New Mail Sync!"); 
                            loadMessages(); 
                        }
                    } catch(e) {}
                }
            }
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible') {
                isUpdatingMessages = false; 
                loadMessages();
                pingTracker(); 
            }
        });

        // 👑 ЭПИЗОД 2: ИНИЦИАЛИЗАЦИЯ И ГЕНЕРАЦИЯ WEB3 КОШЕЛЬКА
        function initWallet() {
            let savedMnemonic = localStorage.getItem('my_mnemonic');
            if (savedMnemonic) {
                myWallet = ethers.Wallet.fromMnemonic(savedMnemonic);
            } else {
                // Если зашли первый раз — создаем уникальную 12-словную личность
                myWallet = ethers.Wallet.createRandom();
                localStorage.setItem('my_mnemonic', myWallet.mnemonic.phrase);
            }
        }

        setInterval(pingTracker, 30000);
        setInterval(pollRelays, 15000); 
        
        if (document.getElementById('contact-list')) {
            initWallet(); // Запускаем генерацию криптографии
            loadContacts();
            if (myUsername) socket.emit('join', { username: myUsername });
            setTimeout(pingTracker, 2000);
            if (localStorage.getItem('push_enabled') === 'true') document.getElementById('push-btn').style.background = "#4CAF50";
        }
    </script>
