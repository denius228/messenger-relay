<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Chat</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#17212b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { background: #17212b; padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .btn-small { background: #2b5278; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #status-bar { background: #212d3b; color: #40a7e3; font-size: 10px; padding: 4px; text-align: center; border-bottom: 1px solid #000; text-transform: uppercase; }
        #contact-list { background: #17212b; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #111; flex-shrink: 0; }
        .contact-card { background: #242f3d; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; white-space: nowrap; border: 1px solid transparent; }
        .contact-card.active { border-color: #40a7e3; background: #2b5278; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); scroll-behavior: smooth; }
        .msg { max-width: 85%; margin-bottom: 12px; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .msg.in { align-self: flex-start; background: #182533; border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        
        /* ИСПРАВЛЕНЫ ПРЫЖКИ ЧАТА ПРИ ФОТОГРАФИЯХ */
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; background: #182533; min-height: 200px; object-fit: cover; }
        .msg audio { width: 220px; height: 40px; margin-top: 8px; display: block; }
        .msg small { font-size: 0.7em; color: #7f91a4; display: block; text-align: right; margin-top: 5px; }
        
        .controls { background: #17212b; padding: 10px 15px; display: flex; gap: 10px; align-items: center; padding-bottom: 15px; position: relative; z-index: 10; flex-shrink: 0; }
        .input-area { flex: 1; background: #242f3d; border-radius: 25px; display: flex; align-items: center; padding: 2px 12px; }
        input { background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; flex: 1; }
        button { background: none; border: none; color: #40a7e3; font-weight: bold; font-size: 26px; cursor: pointer; }
        .recording-active { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% {color: #40a7e3} 50% {color: red} 100% {color: #40a7e3} }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #17212b; padding: 25px; border: 1px solid #40a7e3; border-radius: 20px; z-index: 100; width: 85%; max-width: 320px; text-align: center; }
        .modal input { width: 92%; margin-bottom: 15px; display: block; background: #242f3d; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; box-sizing: border-box; }
        #qr-code { margin: 20px auto; background: white; padding: 10px; display: inline-block; border-radius: 10px; }
        #reader { width: 100%; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    {% if not logged_in %}
        <div style="padding:60px; text-align:center;">
            <h2 style="color:#40a7e3">SECURE LOGIN</h2>
            <form method="POST" action="/login">
                <input type="password" name="password" placeholder="Password" autofocus style="width:80%; padding:15px; background:#242f3d; color:white; border:1px solid #40a7e3; border-radius:15px; text-align:center;">
                <button type="submit" style="margin-top:30px; background:#40a7e3; color:white; padding:15px; width:80%; border-radius:15px; border:none; font-weight:bold;">ENTER</button>
            </form>
        </div>
    {% else %}
        <div class="header">
            <button class="btn-small" onclick="showProfile()">PROFILE</button>
            <span>E2EE CHAT</span> 
            <button class="btn-small" onclick="document.getElementById('add-modal').style.display='block'">+ ADD</button>
        </div>
        <div id="status-bar">SYSTEM READY</div>
        <div id="contact-list"></div>
        <div id="chat"></div>
        <div class="controls">
            <button onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" style="display:none" onchange="uploadMedia(this.files[0])">
            <div class="input-area">
                <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendText()" onfocus="setTimeout(() => document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight, 300)">
                <button id="voice-btn" onclick="toggleVoice()">🎤</button>
            </div>
            <button onclick="sendText()">➤</button>
        </div>

        <div id="add-modal" class="modal">
            <h3>Add Contact</h3>
            <button onclick="startScanner()" style="background:#2b5278; color:white; padding:10px; border-radius:10px; width:100%; margin-bottom:15px; font-size:14px; border:none;">📷 SCAN QR CODE</button>
            <div id="reader"></div>
            <input type="text" id="new-name" placeholder="Friend's Username (e.g. @alice)">
            <input type="text" id="new-key" placeholder="Secret Key">
            <button onclick="addContact()" style="background:#40a7e3; color:white; padding:12px; border-radius:12px; width:100%; font-size:16px; border:none; font-weight:bold;">SAVE</button>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; margin-top:10px; background:none; border:none;">CANCEL</button>
        </div>

        <div id="profile-modal" class="modal">
            <h3>My Profile</h3>
            <input type="text" id="my-username" placeholder="My Username (e.g. @bob)">
            <input type="text" id="my-secret-key" placeholder="My Secret Key">
            <p style="font-size:12px; color:gray;">Show this QR to your friend</p>
            <div id="qr-code"></div>
            <button onclick="saveMyProfile()" style="background:#40a7e3; color:white; padding:10px; border-radius:10px; width:100%; font-size:14px; border:none; font-weight:bold; margin-bottom:10px;">SAVE & UPDATE QR</button>
            <button onclick="closeModals()" style="width:100%; color:gray; font-size:14px; background:none; border:none;">CLOSE</button>
        </div>
    {% endif %}

    <script>
        let lastMessageCount = 0;
        let activeContact = null;
        let contactMap = {};
        let mediaRecorder;
        let audioChunks = [];
        const myHost = window.location.hostname; 
        let html5QrcodeScanner = null;

        let myUsername = localStorage.getItem('my_username') || "";

        function encrypt(text, key) { return CryptoJS.AES.encrypt(text, key).toString(); }
        function decrypt(cipherText, key) {
            try { const bytes = CryptoJS.AES.decrypt(cipherText, key); return bytes.toString(CryptoJS.enc.Utf8) || "[Error]"; }
            catch (e) { return "[Encrypted]"; }
        }

        function setStatus(text) { document.getElementById('status-bar').innerText = text.toUpperCase(); }

        async function pingTracker() {
            if (!myUsername) return;
            try {
                await fetch(`/api/tracker/update`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: myUsername, url: myHost })
                });
            } catch(e) {}
        }

        async function getFriendUrl(friendUsername) {
            try {
                const resp = await fetch(`/api/tracker/get?username=${encodeURIComponent(friendUsername)}`);
                const data = await resp.json();
                if (data.url) return data.url;
            } catch(e) {}
            return null;
        }

        function showProfile() {
            document.getElementById('profile-modal').style.display = 'block';
            document.getElementById('my-username').value = myUsername;
            if(!document.getElementById('my-secret-key').value) {
                document.getElementById('my-secret-key').value = localStorage.getItem('my_key') || "7777";
            }
            if (myUsername) generateQR();
        }

        function saveMyProfile() {
            myUsername = document.getElementById('my-username').value.trim();
            const myKey = document.getElementById('my-secret-key').value.trim();
            if(!myUsername || !myKey) return alert("Fill username and key!");
            localStorage.setItem('my_username', myUsername);
            localStorage.setItem('my_key', myKey);
            generateQR();
            pingTracker();
            alert("Profile Saved!");
        }

        function generateQR() {
            document.getElementById('qr-code').innerHTML = "";
            const key = document.getElementById('my-secret-key').value;
            const data = JSON.stringify({ username: myUsername, key: key });
            new QRCode(document.getElementById("qr-code"), {
                text: data, width: 150, height: 150, colorDark: "#000", colorLight: "#fff"
            });
        }

        function startScanner() {
            if(html5QrcodeScanner) return;
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 200 } },
                (decodedText) => {
                    try {
                        const data = JSON.parse(decodedText);
                        document.getElementById('new-name').value = data.username;
                        document.getElementById('new-key').value = data.key;
                        stopScanner();
                        setStatus("QR SCANNED!");
                    } catch(e) { alert("Invalid QR Code"); }
                },
                (err) => {}
            );
        }

        function stopScanner() {
            if(html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }); }
        }

        function closeModals() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('profile-modal').style.display = 'none';
            stopScanner();
        }

        // ИСПРАВЛЕНО: Blob-конвертер для правильной работы аудио на телефонах (0:00 bug)
        async function displayMedia(url, elementId, key) {
            try {
                const resp = await fetch(url);
                const encryptedText = await resp.text();
                const decryptedDataUrl = decrypt(encryptedText, key); 
                
                const fetchResp = await fetch(decryptedDataUrl);
                const blob = await fetchResp.blob();
                const blobUrl = URL.createObjectURL(blob);

                const el = document.getElementById(elementId);
                if (el) {
                    el.onload = el.onloadedmetadata = () => {
                        const chat = document.getElementById('chat');
                        if (chat.scrollHeight - chat.clientHeight <= chat.scrollTop + el.clientHeight + 100) chat.scrollTop = chat.scrollHeight;
                    };
                    el.src = blobUrl;
                }
            } catch (e) { console.error(e); }
        }

        async function loadContacts() {
            const resp = await fetch('/api/contacts');
            const contacts = await resp.json();
            const list = document.getElementById('contact-list');
            contactMap = {};
            list.innerHTML = contacts.map(c => {
                contactMap[c[1]] = c[0];
                return `<div class="contact-card ${activeContact?.username === c[0] ? 'active' : ''}" onclick="selectContact('${c[0]}', '${c[1]}', '${c[2]}')">${c[0]}</div>`;
            }).join('');
        }

        function selectContact(name, usernameOrIp, key) {
            if (activeContact?.name === name) return;
            activeContact = {name, username: name, key};
            lastMessageCount = 0;
            document.getElementById('chat').innerHTML = "";
            loadMessages();
            loadContacts();
        }

        async function addContact() {
            const username = document.getElementById('new-name').value.trim();
            const key = document.getElementById('new-key').value.trim();
            if(!username || !key) return alert("Fill all fields");
            
            await fetch('/api/contacts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: username, ip: username, key: key})
            });
            closeModals();
            document.getElementById('new-name').value = ''; document.getElementById('new-key').value = '';
            loadContacts();
        }

        // ИСПРАВЛЕНО: Чат больше не "прыгает" при загрузке картинок
        async function loadMessages() {
            if (!activeContact) return;
            const resp = await fetch('/api/messages?chat_with=' + encodeURIComponent(activeContact.username));
            const messages = await resp.json();
            const chat = document.getElementById('chat');
            
            if (messages.length === lastMessageCount) return;

            if (lastMessageCount > 0 && messages.length > lastMessageCount) {
                try { let audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg'); audio.play().catch(e=>{}); } catch(e) {}
            }

            const isAtBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 100;
            let html = "";
            
            for (let m of messages) {
                const isOut = (m[0] === 'Me');
                let text = decrypt(m[1], activeContact.key);
                let content = text;
                const mediaId = "m" + Math.random().toString(36).substr(2, 7);

                if (text.startsWith("IMG:")) {
                    content = `<img id="${mediaId}" src="" alt="Loading..." loading="lazy">`;
                    displayMedia(text.replace("IMG:",""), mediaId, activeContact.key);
                } else if (text.startsWith("VOICE:")) {
                    content = `<audio id="${mediaId}" controls src=""></audio>`;
                    displayMedia(text.replace("VOICE:",""), mediaId, activeContact.key);
                }
                html += `<div class="msg ${isOut ? 'out' : 'in'}"><b>${isOut ? '' : (contactMap[m[0]] || m[0])}</b><br>${content} <small>${m[2]}</small></div>`;
            }
            
            chat.innerHTML = html;
            lastMessageCount = messages.length;
            
            if (isAtBottom || messages.length > lastMessageCount) {
                setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 100);
            }
        }

        async function sendText() {
            const el = document.getElementById('content');
            if (!el.value || !activeContact) return;
            const encrypted = encrypt(el.value, activeContact.key);
            await postMsg(encrypted);
            el.value = '';
        }

        async function uploadMedia(file) {
            if (!file || !activeContact) return;
            setStatus("Encrypting Hi-Fi...");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const encrypted = encrypt(e.target.result, activeContact.key);
                const resp = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: encrypted })
                });
                const { url } = await resp.json();
                const prefix = file.type.startsWith('image') ? "IMG:" : "VOICE:";
                await postMsg(encrypt(prefix + url, activeContact.key));
                setStatus("Sent!");
            };
            reader.readAsDataURL(file);
        }

        async function postMsg(content) {
            setStatus("Locating...");
            const currentFriendUrl = await getFriendUrl(activeContact.username);
            if (!currentFriendUrl) { setStatus("User Offline"); return; }

            setStatus("Sending...");
            const resp = await fetch('/send_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `target_ip=${currentFriendUrl}&target_username=${encodeURIComponent(activeContact.username)}&content=${encodeURIComponent(content)}&my_id=${myUsername}`
            });
            const resText = await resp.text();
            setStatus(resText === "OK" ? "Sent Direct" : "Saved in Mailbox");
            loadMessages();
        }

        // ИСПРАВЛЕНО: Оригинальное Hi-Fi качество голоса (256 kbps, без глушения шума)
        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true, sampleRate: 48000, channelCount: 1 } 
                    });
                    
                    let mimeType = '';
                    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
                    else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

                    mediaRecorder = new MediaRecorder(stream, { 
                        mimeType: mimeType, 
                        audioBitsPerSecond: 256000 
                    });
                    
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => { 
                        uploadMedia(new Blob(audioChunks, {type: mimeType})); 
                        stream.getTracks().forEach(t => t.stop()); 
                    };
                    
                    mediaRecorder.start();
                    btn.classList.add('recording-active');
                    setStatus("Hi-Fi Recording...");
                } catch(e) { alert("Mic error: " + e.message); }
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording-active');
                setStatus("Encoding...");
            }
        }

        async function pollRelays() {
            if (!activeContact) return;
            const resp = await fetch('/api/contacts');
            const contacts = await resp.json();
            for (let c of contacts) {
                const friendUsername = c[0];
                const friendUrl = await getFriendUrl(friendUsername);
                if (friendUrl) {
                    try {
                        const mailResp = await fetch(`https://${friendUrl}/api/mailbox/check?target_id=${myHost}`);
                        const data = await mailResp.json();
                        if (data.received > 0) { 
                            await fetch('/api/messages/save_synced', {
                                method: 'POST', headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({messages: data.messages})
                            });
                            setStatus("New Mail Sync!"); 
                            loadMessages(); 
                        }
                    } catch(e) {}
                }
            }
        }

        setInterval(pingTracker, 30000);
        setInterval(loadMessages, 3000);
        setInterval(pollRelays, 10000); 
        
        if (document.getElementById('contact-list')) {
            loadContacts();
            setTimeout(pingTracker, 2000);
        }
    </script>
</body>
</html>
